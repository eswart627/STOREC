<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOREC Topology View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #05070a;
            background-image: 
                radial-gradient(#1e293b 0.5px, transparent 0.5px), 
                linear-gradient(to right, #0f172a 1px, transparent 1px), 
                linear-gradient(to bottom, #0f172a 1px, transparent 1px);
            background-size: 40px 40px;
            overflow: hidden; /* Keeps it looking like a fixed console */
        }
        .connector-line {
            stroke: #1e293b;
            stroke-width: 1.5;
            fill: none;
            transition: all 0.5s ease;
        }
        .active-line {
            stroke: #3b82f6;
            stroke-dasharray: 4;
            animation: flow 1s linear infinite;
        }
        @keyframes flow { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
    </style>
</head>
<body class="text-slate-400 font-mono">
    <div class="h-screen w-screen relative flex items-center justify-center">
        
        <div class="absolute top-0 left-0 w-full p-6 flex justify-between items-center border-b border-slate-800 bg-slate-950/50 backdrop-blur-sm z-50">
            <div class="flex items-center gap-3">
                <i data-lucide="activity" class="text-blue-500 animate-pulse"></i>
                <h1 class="text-sm font-bold tracking-[0.3em] uppercase">STOREC // Cluster_Map_v2</h1>
            </div>
            <div class="text-[10px] text-slate-500">SYSTEM_STATUS: <span class="text-green-500">NOMINAL</span></div>
        </div>

        <svg id="network-svg" class="absolute inset-0 w-full h-full pointer-events-none"></svg>

        <div id="master-node" class="z-20 bg-slate-900 border-2 border-blue-500 p-6 rounded-xl shadow-[0_0_30px_rgba(59,130,246,0.2)] text-center w-44">
            <div class="bg-blue-600/20 p-3 rounded-lg mb-2 inline-block">
                <i data-lucide="cpu" class="text-blue-400 w-10 h-10"></i>
            </div>
            <div class="text-xs font-black text-blue-400">MASTER_CORE</div>
            <div class="text-[10px] opacity-50">172.18.0.1</div>
        </div>

        <div id="node-container" class="absolute inset-0 pointer-events-none">
            </div>
    </div>

    <script>
        const TOTAL_SLOTS = 12;
        const RADIUS = 320; // Distance from center

        async function updateDashboard() {
            const response = await fetch('/api/status');
            const activeNodes = await response.json();
            const activeIps = Object.keys(activeNodes);
            
            const container = document.getElementById('node-container');
            const svg = document.getElementById('network-svg');
            container.innerHTML = '';
            svg.innerHTML = '';

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            for (let i = 0; i < TOTAL_SLOTS; i++) {
                const angle = (i * (360 / TOTAL_SLOTS)) * (Math.PI / 180);
                const x = centerX + RADIUS * Math.cos(angle) - 80; // 80 is half width
                const y = centerY + RADIUS * Math.sin(angle) - 40; // 40 is half height

                const nodeData = activeNodes[activeIps[i]] || null;
                const isActive = !!nodeData && nodeData.status !== 'Dead';

                // 1. Draw Connection Line
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", centerX);
                line.setAttribute("y1", centerY);
                line.setAttribute("x2", x + 80);
                line.setAttribute("y2", y + 40);
                line.setAttribute("class", `connector-line ${isActive ? 'active-line' : ''}`);
                svg.appendChild(line);

                // 2. Create Node Card
                const nodeDiv = document.createElement('div');
                nodeDiv.className = `absolute transition-all duration-700 p-3 rounded-lg border w-40 pointer-events-auto ${
                    isActive 
                    ? 'bg-slate-900 border-blue-500/50 shadow-lg shadow-blue-500/10 scale-110' 
                    : 'bg-transparent border-slate-800 opacity-30 scale-90 border-dashed'
                }`;
                nodeDiv.style.left = `${x}px`;
                nodeDiv.style.top = `${y}px`;

                nodeDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <i data-lucide="database" class="w-3 h-3 ${isActive ? 'text-blue-400' : 'text-slate-700'}"></i>
                        <div class="h-2 w-2 rounded-full ${isActive ? 'bg-green-500 animate-pulse' : 'bg-slate-800'}"></div>
                    </div>
                    <div class="text-[9px] font-bold ${isActive ? 'text-white' : 'text-slate-700'}">
                        ${isActive ? activeIps[i] : 'SLOT_' + (i+1)}
                    </div>
                    ${isActive ? `
                        <div class="mt-2 h-1 w-full bg-slate-800 rounded-full overflow-hidden">
                            <div class="bg-blue-500 h-full" style="width: ${nodeData.storage}"></div>
                        </div>
                        <div class="text-[7px] mt-1 text-slate-500">DISK_USAGE: ${nodeData.storage}</div>
                    ` : '<div class="text-[7px] text-slate-800 mt-1">AWAITING_CONN...</div>'}
                `;
                container.appendChild(nodeDiv);
            }
            lucide.createIcons();
        }

        setInterval(updateDashboard, 2000);
        window.addEventListener('resize', updateDashboard);
        updateDashboard();
    </script>
</body>
</html>
