syntax = "proto3";

package proto;

// Using Node in Datanode registration
message Node {
    string hostname = 2;
    int32 port = 3;
}

message NodeId {
    string node_id = 1;
    Node node = 2; // hostname and port
}

// Used for sending status of heartbeat
message Status {
    bool success = 1;
    string message = 2;
}

message File {
  string file_name = 1;
  int64  file_size = 2;
}

message Block{
  string block_id = 1;
  bytes  data_bytes = 2;
  int64  block_size = 3;
}

message Placement {
  string block_id = 1;
  NodeId node     = 2;
}

message BlockGroups{
  string             stripe_id = 1;
  repeated Placement placement = 2;
}

message HeartbeatInfo {
  string node_id    = 1;
  int64  timestamp  = 2;
  int64  used_bytes = 3;
  int64  free_bytes = 4;
}