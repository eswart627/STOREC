syntax = "proto3";

package proto;

import "proto/common.proto";

service DataNodeService {
    // all methods only invoked by clientfor block ops
  rpc WriteBlock(WriteBlockRequest)
  returns (WriteBlockResponse);
    // (block_id, data_bytes, block_size)
    // (Status, NodeId, block_id)
    // (Block) => (Status, NodeId, block_id)

  rpc ReadBlock(ReadBlockRequest)
  returns (ReadBlockResponse);
    // (block_id)
    // (Status, Block)

  rpc DeleteBlock(DeleteBlockRequest)
  returns (DeleteBlockResponse);
  // (block_id)
  // (Status, NodeId, block_id)

}

message WriteBlockRequest {
  Block block = 1;
}

message WriteBlockResponse {
  Status status   = 1;
  NodeId node     = 2;
  string block_id = 3;
}

message ReadBlockRequest {
  string block_id = 1;
}

message ReadBlockResponse {
  Status status = 1;
  Block  block  = 2;
}

message DeleteBlockRequest {
  string block_id = 1;
}

message DeleteBlockResponse {
  Status status   = 1;
  NodeId node     = 2;
  string block_id = 3;
}