syntax = "proto3";

package proto;

import "common.proto";

service NameNodeService {

    // DataNode registration
    rpc RegisterDataNode (RegisterRequest)
    returns (RegisterResponse);

    rpc AllocateBlocks(AllocateBlocksRequest)
    returns (AllocateBlocksResponse);
    // invoked by client for storage targets
    // namenode access record/registry
    // (file_name, file_size, stripe_size, data_blocks_k, parity_blocks_m)
    // (stripe_id, block_id, NodeId)
    // (File, string_id, data_blocks_k, data_blocks_m) => (stripe_id, Placement)
   

    rpc CommitFile(CommitFileRequest)
    returns (CommitFileResponse);
    // invoked by client to finalize the file status
    // namenode accesses the file metadata structure
    // (File, total_blocks, block_ids[])
    // (Status)


    rpc GetFileMetadata (GetFileMetadataRequest)
    returns (GetFileMetadataResponse);
    // invoked by client for file metadata query (file retrieval)
    // namenode accesses the file metadata structure
    // (File)
    // (File, stripe_size, data_blocks_k, parity_blocks_m, block_groups)

    rpc DeleteFile (DeleteFileRequest)
    returns (DeleteFileResponse);
    // invoked by client for deletion
    // namenode accesses the file metadata structure
    // (File)
    // (success, message, block_ids[])


    // Heartbeat
    rpc SendHeartbeat (HeartbeatRequest) 
    returns (HeartbeatResponse);

    rpc ListFiles (ListFilesRequest)
    returns (ListFilesResponse);


}



message RegisterRequest {
    Node node = 1;
    int64 capacity_bytes = 2;
    string node_id = 3;   // datanode sends its stored ID of it has one
}

message RegisterResponse {
    string node_id = 1;   // Renamed 'Id' as 'node_id' for consistency with heartbeat
    Status status = 2;
}



message AllocateBlocksRequest{
  File  file_details    = 1;
  int64 stripe_size     = 2;
  int32 data_blocks_k   = 3;
  int32 parity_blocks_m = 4;
}

message AllocateBlocksResponse{
  repeated BlockGroups block_groups = 1;
}

message CommitFileRequest{
  File            file_details = 1;
  int32           total_blocks = 2;
  repeated string block_ids    = 3;
}

message CommitFileResponse{
  Status status = 1;
}

message GetFileMetadataRequest{
  File file_details = 1;
}

message GetFileMetadataResponse{
  File                 file_details    = 1;
  int64                stripe_size     = 2;
  int32                data_blocks_k   = 3;
  int32                parity_blocks_m = 4;
  repeated BlockGroups block_groups    = 5;
}

message DeleteFileRequest{
  File file_details = 1;
}

message DeleteFileResponse{
  Status          status    = 1;
  repeated string block_ids = 2;
}

message ListFilesRequest{}

message ListFilesResponse{
  repeated File file_details = 1;
}


message HeartbeatRequest {
    Heartbeat heartbeat = 1;
}

message HeartbeatResponse {
    Status status = 1;
}

