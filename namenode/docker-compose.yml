services:
  mysql:
    image: mysql
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3308:3306"
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql
      # This line runs your SQL script automatically on the first startup
      - ./models/dn_table.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  mysql_data: