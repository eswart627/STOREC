<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>STOREC | Advanced Storage Client</title>

    <script src="/static/app.js"></script>

    <style>
      :root {
        --accent-red: #e63946;
        --dark-red: #9b2226;
        --panel-bg: rgba(15, 15, 15, 0.75);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-main: #f1f1f1;
        --terminal-green: #00ff41;
      }

      body {
        margin: 0;
        font-family: "Inter", "Segoe UI", Roboto, sans-serif;
        color: var(--text-main);

        background:
          linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)),
          url("/static/assets/bw_pattern_mid.jpg") center center / cover
            no-repeat fixed;

        height: 100vh;
        overflow: hidden;
      }

      /* HEADER */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;

        padding: 15px 40px;

        background: rgba(0, 0, 0, 0.4);

        backdrop-filter: blur(5px);

        border-bottom: 1px solid var(--glass-border);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .brand img {
        height: 45px;
      }
      .brand h2 {
        margin: 0;
        font-size: 1.2rem;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-weight: 300;
      }
      .status-badge {
        font-size: 0.75rem;
        padding: 4px 12px;

        border-radius: 20px;

        background: rgba(0, 255, 65, 0.1);

        color: var(--terminal-green);

        border: 1px solid var(--terminal-green);
      }
      .brand h2 {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      /* circular frame */
      .logo-circle {
        width: 50px;
        height: 50px;

        min-width: 50px;

        border-radius: 50%;

        overflow: hidden;

        background: rgba(0, 0, 0, 0);

        border: 2px solid rgba(255, 255, 255, 0.25);

        display: flex;
        align-items: center;
        justify-content: center;

        box-shadow: 0 0 12px rgba(255, 255, 255, 0.15);
      }
      /* image scaling */
      .logo-circle img {
        width: 100%;
        height: 100%;

        object-fit: contain;

        display: block;
      }

      /* LAYOUT */
      .main-container {
        display: flex;
        gap: 25px;
        padding: 25px;
        height: calc(100vh - 110px);
      }
      .panel {
        backdrop-filter: blur(15px);
        background: var(--panel-bg);

        border-radius: 16px;

        padding: 24px;

        border: 1px solid var(--glass-border);

        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);

        display: flex;
        flex-direction: column;
      }
      .left-panel {
        width: 35%;
      }
      .right-panel {
        width: 65%;
      }
      h3 {
        margin-top: 0;

        font-size: 0.9rem;

        text-transform: uppercase;

        letter-spacing: 1.5px;

        color: #aaa;

        display: flex;
        align-items: center;
        gap: 10px;
      }
      h3::before {
        content: "";

        width: 4px;
        height: 16px;

        background: var(--accent-red);
      }

      /* BUTTONS */
      .button-group {
        display: flex;
        gap: 12px;
      }
      button {
        padding: 10px 18px;

        border-radius: 8px;

        border: 1px solid rgba(255, 255, 255, 0.1);

        background: rgba(255, 255, 255, 0.05);

        color: white;

        font-size: 0.85rem;

        font-weight: 600;

        cursor: pointer;

        transition: 0.2s;
      }
      button:hover {
        background: var(--accent-red);
        border-color: var(--accent-red);

        box-shadow: 0 0 15px rgba(230, 57, 70, 0.4);
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent-red), var(--dark-red));

        border: none;
      }

      /*Refresh button*/
      /* refresh spin animation */

      @keyframes spinIcon {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }

      .spin {
        display: inline-block;

        animation: spinIcon 0.2s linear;
      }

      /* list flick animation */

      @keyframes flickerRefresh {
        0% {
          opacity: 0.3;
          transform: translateY(2px);
        }

        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .file-refresh {
        animation: flickerRefresh 0.25s ease;
      }

      /* FILE LIST */
      #fileList {
        flex-grow: 1;

        overflow-y: auto;

        border-radius: 10px;

        background: rgba(0, 0, 0, 0.3);

        padding: 5px;

        border: 1px solid var(--glass-border);
      }
      #fileList div {
        padding: 12px 15px;

        margin-bottom: 5px;

        cursor: pointer;

        border-radius: 8px;

        border: 1px solid transparent;

        transition: 0.2s;

        font-size: 0.9rem;

        display: flex;
        align-items: center;
      }
      #fileList div::before {
        content: "📄";
        margin-right: 12px;
        opacity: 0.6;
      }
      #fileList div:hover {
        background: rgba(255, 255, 255, 0.05);

        border-color: rgba(255, 255, 255, 0.1);
      }

      /* selected file highlight */
      .file-selected {
        background: rgba(230, 57, 70, 0.15);

        border: 1px solid rgba(230, 57, 70, 0.4);
      }

      /* UPLOAD ZONE */
      .upload-zone {
        padding: 20px;

        border: 2px dashed var(--glass-border);

        border-radius: 12px;

        text-align: center;

        margin-bottom: 20px;
      }

      /* MODE SELECTOR */
      .mode-selector {
        display: flex;

        gap: 10px;

        margin-bottom: 20px;
      }
      .mode-selector input {
        display: none;
      }
      .mode-selector label {
        padding: 8px 16px;

        border-radius: 20px;

        background: rgba(255, 255, 255, 0.05);

        border: 1px solid rgba(255, 255, 255, 0.15);

        cursor: pointer;

        font-size: 0.85rem;

        transition: 0.2s;
      }
      .mode-selector input:checked + label {
        background: linear-gradient(135deg, var(--accent-red), var(--dark-red));

        border-color: var(--accent-red);

        box-shadow: 0 0 10px rgba(230, 57, 70, 0.4);
      }

      /* TERMINAL */
      #console {
        flex-grow: 1;

        background: #0a0a0a;

        color: var(--terminal-green);

        font-family: monospace;

        font-size: 0.85rem;

        padding: 15px;

        border-radius: 10px;

        border: 1px solid #333;
      }

      /* NOTIFICATIONS */
      #notificationContainer {
        position: fixed;

        top: 80px;
        right: 20px;

        display: flex;
        flex-direction: column;
        gap: 10px;

        z-index: 9999;
      }

      .notification {
        padding: 12px 18px;

        border-radius: 10px;

        font-size: 0.85rem;

        backdrop-filter: blur(8px);

        background: rgba(0, 0, 0, 0.85);

        border: 1px solid rgba(255, 255, 255, 0.15);

        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6);

        animation: slideIn 0.25s ease;
      }

      .notification.success {
        border-left: 4px solid #00ff41;
      }

      .notification.error {
        border-left: 4px solid #ff4d4d;
      }

      .notification.info {
        border-left: 4px solid #4da6ff;
      }

      @keyframes slideIn {
        from {
          transform: translateX(30px);
          opacity: 0;
        }

        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <div class="brand">
        <div class="logo-circle">
          <img src="/static/assets/logo.png" />
        </div>

        <h2>Storec</h2>
      </div>

      <div class="status-badge">System Active</div>
    </header>

    <div class="main-container">
      <!-- FILE REPOSITORY -->

      <div class="panel left-panel">
        <h3>File Repository</h3>

        <div class="button-group" style="margin-bottom: 15px">
          <button id="refreshBtn" onclick="loadFiles()">
            <span id="refreshIcon"> ↻ </span>
            Refresh
          </button>
        </div>

        <div id="fileList">
          <div style="color: #666; font-style: italic">
            Initializing filesystem...
          </div>
        </div>

        <div class="button-group" style="margin-top: 20px">
          <button style="flex: 1" onclick="readSelectedFile()">Download</button>

          <button
            style="flex: 1; border-color: #441111"
            onclick="deleteSelectedFile()"
          >
            Delete
          </button>
        </div>
      </div>

      <!-- OPERATIONS -->

      <div class="panel right-panel">
        <h3>Upload File</h3>

        <div class="upload-zone">
          <input type="file" id="fileInput" />
        </div>

        <div class="mode-selector">
          <input type="radio" id="mode-single" name="mode" value="single" />

          <label for="mode-single"> Single </label>

          <input
            type="radio"
            id="mode-parallel"
            name="mode"
            value="parallel"
            checked
          />

          <label for="mode-parallel"> Parallel </label>

          <input
            type="radio"
            id="mode-block"
            name="mode"
            value="block_parallel"
          />

          <label for="mode-block"> Block </label>
        </div>

        <button
          class="btn-primary"
          onclick="uploadFile()"
          style="width: 200px; margin-bottom: 25px"
        >
          Execute Upload
        </button>

        <hr
          style="
            border: 0;
            border-top: 1px solid var(--glass-border);
            margin-bottom: 20px;
          "
        />

        <h3>Client Console</h3>

        <div id="console"></div>
      </div>
    </div>
    <div id="notificationContainer"></div>
  </body>
</html>
